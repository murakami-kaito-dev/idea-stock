name: Daily Idea Stock

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Collect & summarize info
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python scripts/collect_ideas.py

      - name: Commit memo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memos/
          git diff --staged --quiet || git commit -m "📚 Idea stock $(date +'%Y-%m-%d')"
          git push
